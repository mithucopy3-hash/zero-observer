<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Observer</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            color:#fff;
            font-family:Georgia, serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        h1{
            font-size:60px;
            letter-spacing:8px;
            margin-bottom:20px;
        }

        p{
            color:#aaa;
            font-size:20px;
            margin-bottom:40px;
        }

        a{
            color:white;
            text-decoration:none;
            border:1px solid white;
            padding:15px 40px;
            transition:.3s;
        }

        a:hover{
            background:white;
            color:black;
        }
    </style>
</head>

<body>

<div>

<h1>ZERO OBSERVER</h1>

<p>Observe without ego.</p>

</div>

</html>
